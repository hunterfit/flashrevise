# codemagic.yaml — Configuration pour build iOS cloud (sans Mac)
# Uploadez ce fichier à la racine du repo GitHub, connectez Codemagic
# https://codemagic.io (gratuit jusqu'à 500 min/mois)

workflows:

  # ───────────────────────────────────────────
  # BUILD ANDROID — AAB pour Google Play Store
  # ───────────────────────────────────────────
  android-release:
    name: Android Release (Play Store)
    max_build_duration: 30
    environment:
      android_signing:
        - flashrevise_keystore        # Nom du keystore ajouté dans Codemagic > Teams > Code signing
      groups:
        - google_play                 # Variables : GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      vars:
        PACKAGE_NAME: "com.flashrevise.app"
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android
      - name: Build Android Release AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/apk/release/app-release.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal           # Commence par internal, puis promotion vers production
        submit_as_draft: true

  # ───────────────────────────────────────────
  # BUILD iOS — IPA pour App Store (macOS cloud)
  # ───────────────────────────────────────────
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 60
    instance_type: mac_mini_m1    # Machine macOS cloud Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.flashrevise.app
      groups:
        - app_store_connect        # Variables : APP_STORE_CONNECT_KEY_IDENTIFIER, etc.
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.flashrevise.app"
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
